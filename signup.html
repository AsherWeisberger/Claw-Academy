<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Claw Academy - Free OpenClaw Course</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #16213e; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #00d9ff; }
        button {
            width: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        button:hover { transform: translateY(-2px); }
        .note { font-size: 14px; color: #999; margin-top: 15px; }
        .success { display: none; color: #00aa00; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦶 Join Claw Academy</h1>
        <p>Get free OpenClaw tips, lessons, and updates delivered to your inbox.</p>
        
        <form id="signupForm">
            <input type="email" id="email" placeholder="your@email.com" required>
            <input type="text" id="name" placeholder="Your name (optional)">
            <button type="submit">Join Free!</button>
        </form>
        
        <p class="success" id="success">🎉 You're in! Check your inbox.</p>
        <p class="note">Join 200+ others learning OpenClaw</p>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            
            // Store in localStorage for now (later: ConvertKit API)
            const subscribers = JSON.parse(localStorage.getItem('subscribers') || '[]');
            subscribers.push({ email, name, date: new Date().toISOString() });
            localStorage.setItem('subscribers', JSON.stringify(subscribers));
            
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        });
    </script>
</body>
</html>
